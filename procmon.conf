# ==============================================
# procmon 进程守护配置文件
# 配置说明：监控指定进程，崩溃后自动重启
# ==============================================

# 要监控的进程名称
process_name=process_name

# 进程挂掉后，执行的重启命令
start_command=restart_command

# 是否开启自动重启：1=开启，0=关闭
auto_restart=1

# 进程状态检查间隔（单位：秒），每隔2秒检查一次进程是否存活
interval=2

# 最大自动重启次数，防止无限重启
max_restart=10